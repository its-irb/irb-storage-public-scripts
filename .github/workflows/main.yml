name: Build & Release — bifrost-transfer + bifrost-mount

on:
  push:
    paths:
      - "bifrost-transfer/**"
      - "bifrost-mount/**"
      - "shared/**"
      - ".github/workflows/main.yml"
    branches:
      - main
      - release
      - develop
      - feature/**
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ─────────────────────────────────────────────────────────────────────────────
# macOS — flet build macos → .app
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        app: [bifrost-transfer, bifrost-mount]
    steps:
      - name: Checkout código
        uses: actions/checkout@v6.0.2

      - name: Instalar Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Instalar dependencias Python
        run: |
          pip install --upgrade pip
          pip install -r shared/requirements.txt

      - name: Copiar macos-assets-downloader.sh dentro de src/
        run: |
          if [ "${{ matrix.app }}" = "bifrost-mount" ]; then
            cp shared/macos-assets-downloader.sh ${{ matrix.app }}/src/macos-assets-downloader.sh
          else
            cp shared/macos-rclone-downloader.sh ${{ matrix.app }}/src/macos-rclone-downloader.sh
          fi

      - name: Descargar rclone y fuse-t para macOS
        run: |
          if [ "${{ matrix.app }}" = "bifrost-mount" ]; then
            cd ${{ matrix.app }}/src && bash macos-assets-downloader.sh
          else
            cd ${{ matrix.app }}/src && bash macos-rclone-downloader.sh
          fi

      - name: Limpiar nombre de rama
        id: clean_branch
        run: |
          clean=$(echo "${{ github.ref_name }}" | sed 's/\//-/g')
          echo "name=$clean" >> $GITHUB_OUTPUT

      - name: Escribir versión
        run: echo "__version__ = '1.0.${{ github.run_number }}'" > ${{ matrix.app }}/src/version.py

      - name: Escribir versión en pyproject.toml
        run: |
          sed -i '' 's/^version = .*/version = "1.0.${{ github.run_number }}"/' \
            ${{ matrix.app }}/pyproject.toml

      - name: Añadir ruta al paquete de backend pyproject.toml
        shell: bash
        run: |
          WORKSPACE="${GITHUB_WORKSPACE//\\//}"
          sed -i '' "s|__BUILDPATH__|${WORKSPACE}|g" \
            ${{ matrix.app }}/pyproject.toml

      - name: Build bifrost-backend wheel
        run: |
          pip install build
          python -m build shared/ --outdir ${{ matrix.app }}/src/

          python <<'PY'
          from pathlib import Path
          import glob

          app = "${{ matrix.app }}"
          pyproject = Path(app) / "pyproject.toml"

          wheels = glob.glob(f"{app}/src/bifrost_shared-*.whl")
          if not wheels:
              raise SystemExit("No se encontró bifrost_shared-*.whl")

          wheel_uri = Path(wheels[0]).resolve().as_uri()

          content = pyproject.read_text()
          content = content.replace(
              '"bifrost-backend",',
              f'"bifrost-backend @ {wheel_uri}",'
          )
          pyproject.write_text(content)
          print("OK:", wheel_uri)
          PY

      - name: Build macOS
        run: |
          cd ${{ matrix.app }}
          echo "y" | flet build macos --output dist --no-rich-output

      - name: Debug - verificar contingut del bundle
        if: matrix.app == 'bifrost-mount'
        run: |
          APP_BUNDLE=$(find ${{ matrix.app }}/dist -maxdepth 1 -name "*.app" | head -1)
          echo "=== Mida total ==="
          du -sh "$APP_BUNDLE"
          echo "=== site-packages ==="
          find "$APP_BUNDLE" -name "site-packages" -type d | head -5
          find "$APP_BUNDLE" -name "site-packages" -type d -exec du -sh {} \; 2>/dev/null | head -5
          echo "=== bifrost_shared ==="
          find "$APP_BUNDLE" -name "bifrost_shared*" 2>/dev/null
          echo "=== boto3 ==="
          find "$APP_BUNDLE" -name "boto3" -type d 2>/dev/null
          echo "=== ldap3 ==="
          find "$APP_BUNDLE" -name "ldap3" -type d 2>/dev/null
          echo "=== app.zip ==="
          find "$APP_BUNDLE" -name "app.zip" | head -3

      - name: Añadir fuse_t.framework al bundle
        if: matrix.app == 'bifrost-mount'
        run: |
          APP_BUNDLE=$(find ${{ matrix.app }}/dist -maxdepth 1 -name "*.app" | head -1)
          cp -R ${{ matrix.app }}/src/frameworks/fuse_t.framework \
            "${APP_BUNDLE}/Contents/Frameworks/"

      - name: Renombrar .app
        env:
          BRANCH_SUFFIX: ${{ steps.clean_branch.outputs.name }}
          APP: ${{ matrix.app }}
        run: |
          cd ${APP}/dist
          BUNDLE=$(find . -maxdepth 1 -name "*.app" | head -1 | sed 's|./||')
          echo "App bundle encontrado: $BUNDLE"
          mv "$BUNDLE" "${APP}-macos.app"
          ls -lah .

      - name: Crear DMG
        uses: L-Super/create-dmg-actions@v1.0.3
        with:
          dmg_name: ${{ matrix.app }}-${{ steps.clean_branch.outputs.name }}-macos
          src_dir: ${{ matrix.app }}/dist/${{ matrix.app }}-${{ steps.clean_branch.outputs.name }}-macos.app

      - name: Subir artefacto
        uses: actions/upload-artifact@v7.0.0
        with:
          name: ${{ matrix.app }}-macos-${{ steps.clean_branch.outputs.name }}
          path: "*.dmg"

  # ─────────────────────────────────────────────────────────────────────────────
  # Windows — flet build windows + Inno Setup
  # ─────────────────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        app: [bifrost-transfer, bifrost-mount]
    steps:
      - name: Checkout código
        uses: actions/checkout@v6.0.2

      - name: Enable long paths
        shell: powershell
        run: |
          git config --global core.longpaths true
          Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" -Name "LongPathsEnabled" -Value 1

      - name: Instalar Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      # - name: Instalar Flutter
      #   uses: subosito/flutter-action@v2
      #   with:
      #     flutter-version: "3.41.4"
      #     channel: stable

      - name: Instalar dependencias Python
        run: pip install -r shared/requirements.txt

      - name: Copiar windows-assets-downloader.sh dentro de src/
        shell: bash
        run: cp shared/windows-assets-downloader.sh ${{ matrix.app }}/src/windows-assets-downloader.sh

      - name: Descargar rclone para Windows
        shell: bash
        run: cd ${{ matrix.app }}/src && bash windows-assets-downloader.sh

      - name: Limpiar nombre de rama
        id: clean_branch
        shell: bash
        run: |
          clean=$(echo "${{ github.ref_name }}" | sed 's/\//-/g')
          echo "name=$clean" >> $GITHUB_OUTPUT

      - name: Escribir versión
        shell: bash
        run: echo "__version__ = '1.0.${{ github.run_number }}'" > ${{ matrix.app }}/src/version.py

      - name: Escribir versión en pyproject.toml
        shell: bash
        run: |
          sed -i 's/^version = .*/version = "1.0.${{ github.run_number }}"/' \
            ${{ matrix.app }}/pyproject.toml

      - name: Añadir ruta al paquete de backend pyproject.toml
        shell: bash
        run: |
          sed -i "s|__BUILDPATH__|${GITHUB_WORKSPACE//\\//}|g" \
            ${{ matrix.app }}/pyproject.toml

      - name: Build bifrost-backend wheel
        shell: pwsh
        run: |
          pip install build
          python -m build shared/ --outdir "${{ matrix.app }}/src/"

          @'
          from pathlib import Path
          import glob

          app = "${{ matrix.app }}"
          pyproject = Path(app) / "pyproject.toml"

          wheels = glob.glob(f"{app}/src/bifrost_shared-*.whl")
          if not wheels:
              raise SystemExit("No se encontró bifrost_shared-*.whl")

          wheel_uri = Path(wheels[0]).resolve().as_uri()

          content = pyproject.read_text()
          content = content.replace(
              '"bifrost-backend",',
              f'"bifrost-backend @ {wheel_uri}",'
          )
          pyproject.write_text(content)
          print("OK:", wheel_uri)
          '@ | python

      - name: Build Windows
        shell: bash
        env:
          PYTHONUTF8: "1"
        run: |
          cd ${{ matrix.app }}
          echo "y" | flet build windows --output dist --no-rich-output -v

      - name: Crear directorio installer
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path ${{ matrix.app }}/installer

      - name: Package Windows installer (Inno Setup)
        shell: pwsh
        env:
          BRANCH_SUFFIX: ${{ steps.clean_branch.outputs.name }}
          APP_VERSION: "1.0.${{ github.run_number }}"
          APP: ${{ matrix.app }}
        run: |
          Write-Host "=== dist/ structure ==="
          Get-ChildItem -Recurse $env:APP/dist | Select-Object FullName
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DBranchSuffix="$env:BRANCH_SUFFIX" `
            /DAppVersion="$env:APP_VERSION" `
            /DAppName="$env:APP" `
            "$env:APP\installer.iss"

      - name: Subir artefacto
        uses: actions/upload-artifact@v7.0.0
        with:
          name: ${{ matrix.app }}-windows-${{ steps.clean_branch.outputs.name }}
          path: ${{ matrix.app }}/installer/*.exe

  # ─────────────────────────────────────────────────────────────────────────────
  # Rocky Linux — PyInstaller onefile para las dos apps
  # flet build linux no soporta onefile
  # flet solo soporta devian y ubuntu, y como tenemos Rocky Linux 9, flet no es compatible.
  # https://flet.dev/docs/getting-started/installation/ : Flet supports Debian 10, 11 and 12 and Ubuntu 20.04, 22.04 and 24.04 LTS.
  # ─────────────────────────────────────────────────────────────────────────────
  build-rocky:
    runs-on: ubuntu-latest
    container:
      image: rockylinux:9
    strategy:
      matrix:
        app: [bifrost-transfer, bifrost-mount]
    steps:
      - name: Instalar dependencias sistema
        run: |
          dnf install -y --allowerasing python3.11 python3.11-pip python3.11-devel gcc make \
            glibc-devel unzip zip curl
          python3.11 -m pip install --upgrade pip setuptools wheel

      - name: Checkout código
        uses: actions/checkout@v6.0.2

      - name: Instalar dependencias Python
        run: |
          python3.11 -m pip install -r shared/requirements.txt
          python3.11 -m pip install pyinstaller

      - name: Copiar linux-assets-downloader.sh dentro de src/
        run: cp shared/linux-assets-downloader.sh ${{ matrix.app }}/src/linux-assets-downloader.sh

      - name: Descargar rclone para Linux
        run: cd ${{ matrix.app }}/src && bash linux-assets-downloader.sh

      - name: Limpiar nombre de rama
        id: clean_branch
        run: |
          clean=$(echo "${{ github.ref_name }}" | sed 's/\//-/g')
          echo "name=$clean" >> $GITHUB_OUTPUT

      - name: Escribir versión
        run: echo "__version__ = '1.0.${{ github.run_number }}'" > ${{ matrix.app }}/src/version.py

      - name: Build bifrost-backend wheel
        run: |
          python3.11 -m pip install build
          python3.11 -m build shared/ --outdir ${{ matrix.app }}/src/
          WHEEL=$(ls $(pwd)/${{ matrix.app }}/src/bifrost_shared-*.whl)
          sed -i 's|"bifrost-backend",|"bifrost-backend @ file://'"${WHEEL}"'",|' ${{ matrix.app }}/pyproject.toml

      - name: Build Rocky Linux (PyInstaller onefile)
        env:
          BRANCH_SUFFIX: ${{ steps.clean_branch.outputs.name }}
          APP: ${{ matrix.app }}
        run: |
          mkdir -p dist
          cd ${APP}/src
          python3.11 -m PyInstaller --onefile main.py \
            --add-data "assets/bin/rclone:." \
            --collect-all flet \
            --collect-all flet_core \
            --hidden-import flet.fastapi \
            --hidden-import uvicorn \
            --hidden-import uvicorn.lifespan.on \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.protocols.websockets.auto \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.loops.auto \
            --distpath ../../dist
          mv ../../dist/main "../../dist/${APP}-linux"

      - name: Verificar artefacto generado
        run: ls -lah dist/

      - name: Subir artefacto
        uses: actions/upload-artifact@v7.0.0
        with:
          name: ${{ matrix.app }}-linux-${{ steps.clean_branch.outputs.name }}
          path: dist/${{ matrix.app }}-${{ steps.clean_branch.outputs.name }}-linux

  # ─────────────────────────────────────────────────────────────────────────────
  # Release — solo en main y release
  # Recoge los artefactos de los tres jobs y crea una GitHub Release
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    needs: [build-macos, build-windows, build-rocky]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/release'
    steps:
      - name: Checkout código
        uses: actions/checkout@v6.0.2

      - name: Descargar todos los artefactos
        uses: actions/download-artifact@v4.3.0
        with:
          path: dist
          merge-multiple: true

      - name: Verificar dist
        run: ls -lah dist/

      - name: Limpiar nombre de rama
        id: clean_branch
        run: |
          clean=$(echo "${{ github.ref_name }}" | sed 's/\//-/g')
          echo "name=$clean" >> $GITHUB_OUTPUT

      #- name: Zipear .app bundles de macOS
      #  env:
      #    BRANCH_SUFFIX: ${{ steps.clean_branch.outputs.name }}
      #  run: |
      #    cd dist
      #    for APP in bifrost-transfer bifrost-mount; do
      #      BUNDLE="${APP}-macos.app"
      #      if [ -d "$BUNDLE" ]; then
      #        zip -r "${BUNDLE}.zip" "$BUNDLE"
      #        rm -rf "$BUNDLE"
      #        echo "Zipeado: ${BUNDLE}.zip"
      #      fi
      #    done
       #   ls -lah .

      # - name: Verificar artefactos macOS
      #   env:
      #     BRANCH_SUFFIX: ${{ steps.clean_branch.outputs.name }}
      #   run: |
      #     ls -lah dist/
      #     for APP in bifrost-transfer bifrost-mount; do
      #       test -f "dist/${APP}-macos.app.zip" \
      #         && echo "OK: ${APP}" \
      #         || echo "WARNING: ${APP} no encontrado"
      #     done

      #Por si queremos quitar el nombre de la rama de los archivos finales, aunque no es tan importante porque ya se incluye en el tag de la release.
      - name: Eliminar sufijo de rama de los nombres de archivo
        shell: bash
        env:
          BRANCH_SUFFIX: ${{ steps.clean_branch.outputs.name }}
        run: |
          for file in dist/*; do
            [[ -f "$file" ]] || continue
            base=$(basename "$file")
            new_name="${base/-${BRANCH_SUFFIX}/}"
            if [[ "$base" != "$new_name" ]]; then
              mv "$file" "dist/$new_name"
            fi
          done
          ls -lah dist/

      - name: Crear GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Release v1.0.${{ github.run_number }}"
          draft: false
          prerelease: false
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
