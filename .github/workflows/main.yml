name: Build Multiple Executables and Upload to GitHub Releases

on:
  push:
    paths:
      - "minio/*.py"
    branches:
      - main
      - release
      - develop
      - feature/*
  workflow_dispatch:

jobs:
  build-cli:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Instalar dependencias CLI
        run: |
          python -m pip install --upgrade pip
          pip install -r minio/pip-requirements.txt
          pip install pyinstaller

      - name: Descargar rclone para la plataforma actual
        shell: bash
        run: |
          mkdir -p minio/rclone-bin

          RCLONE_VERSION="v1.71.0"
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            curl -L "https://downloads.rclone.org/${RCLONE_VERSION}/rclone-${RCLONE_VERSION}-windows-amd64.zip" -o rclone.zip
            unzip -j rclone.zip "*/rclone.exe" -d minio/rclone-bin/
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            curl -L "https://downloads.rclone.org/${RCLONE_VERSION}/rclone-${RCLONE_VERSION}-osx-amd64.zip" -o rclone.zip
            unzip -j rclone.zip "*/rclone" -d minio/rclone-bin/
            chmod +x minio/rclone-bin/rclone
          elif [[ "$RUNNER_OS" == "Linux" ]]; then
            curl -L "https://downloads.rclone.org/${RCLONE_VERSION}/rclone-${RCLONE_VERSION}-linux-amd64.zip" -o rclone.zip
            unzip -j rclone.zip "*/rclone" -d minio/rclone-bin/
            chmod +x minio/rclone-bin/rclone
          fi

          echo "Rclone downloaded:"
          ls -lah minio/rclone-bin/

      - name: Depurar nombre de rama
        shell: bash
        run: |
          echo "Ref name: ${{ github.ref_name }}"

      - name: Limpia nombre de rama para artefactos
        id: clean_branch
        shell: bash
        run: |
          clean_name=$(echo "${{ github.ref_name }}" | sed 's/\//-/g')
          echo "name=$clean_name" >> $GITHUB_OUTPUT
          echo "Clean name: $clean_name"

      - name: Crear ejecutables CLI
        env:
          BRANCH_SUFFIX: ${{ steps.clean_branch.outputs.name }}
        run: |
          mkdir -p dist
          cd minio
          echo "__version__ = 'v1.0.${{ github.run_number }}'" > version.py

          # Determinar el nombre del binario de rclone y el separador --add-data según OS
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            RCLONE_BIN="rclone-bin/rclone.exe"
            ADD_DATA="rclone-bin/rclone.exe;."
          else
            RCLONE_BIN="rclone-bin/rclone"
            ADD_DATA="rclone-bin/rclone:."
          fi

          for script in *.py; do
            script_name=$(basename "$script" .py)

            if [[ "$script" == "version.py" || "$script" == "minio-sts-credentials-request.py" ]]; then
              continue
            fi

            if [[ "$RUNNER_OS" == "Windows" ]] && [[ ! "$script" == *functions* ]]; then
              pyinstaller --onefile "$script" --add-data "$ADD_DATA" --distpath ../dist
              mv "../dist/$script_name.exe" "../dist/${script_name}-${BRANCH_SUFFIX}-windows.exe"
            elif [[ "$RUNNER_OS" == "Linux" ]] && [[ ! "$script" == *-gui.py ]] && [[ ! "$script" == *functions* ]]; then
              pyinstaller --onefile "$script" --add-data "$ADD_DATA" --distpath ../dist
              mv "../dist/$script_name" "../dist/${script_name}-${BRANCH_SUFFIX}-linux"
            elif [[ "$RUNNER_OS" == "macOS" ]] && [[ ! "$script" == *functions* ]]; then
              pyinstaller --onefile "$script" --add-data "$ADD_DATA" --distpath ../dist
              mv "../dist/$script_name" "../dist/${script_name}-${BRANCH_SUFFIX}-macos"
            fi
          done
        shell: bash

      - name: Verificar archivos generados
        shell: bash
        run: |
          ls -lah dist || ls dist

      - name: Subir ejecutables CLI como artefactos
        uses: actions/upload-artifact@v4
        with:
          name: executables-cli-${{ matrix.os }}-${{ steps.clean_branch.outputs.name }}
          path: dist/*

  build-rocky:
    runs-on: ubuntu-latest
    container:
      image: rockylinux:9
    steps:
      - name: Instalar dependencias básicas
        run: |
          dnf install -y python3 python3-pip python3-devel gcc make glibc-devel python3-tkinter unzip curl
          pip3 install --upgrade pip setuptools wheel pyinstaller

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Instalar requirements
        run: |
          pip install -r minio/pip-requirements.txt
          pip install pyinstaller

      - name: Descargar rclone para Linux (cluster)
        run: |
          mkdir -p minio/rclone-bin
          curl -L "https://downloads.rclone.org/v1.71.0/rclone-v1.71.0-linux-amd64.zip" -o rclone.zip
          unzip -j rclone.zip "*/rclone" -d minio/rclone-bin/
          chmod +x minio/rclone-bin/rclone
          echo "Rclone downloaded:"
          ls -lah minio/rclone-bin/

      - name: Limpia nombre de rama para artefactos
        id: clean_branch
        run: echo "name=${{ github.ref_name }}" | sed 's/\//-/g' >> $GITHUB_OUTPUT

      - name: Compilar binario
        env:
          BRANCH_SUFFIX: ${{ steps.clean_branch.outputs.name }}
        run: |
          mkdir -p dist
          cd minio
          echo "__version__ = 'v1.0.${{ github.run_number }}'" > version.py
          pyinstaller --onefile bifrost.py --add-data "rclone-bin/rclone:." --distpath ../dist
          mv ../dist/bifrost ../dist/bifrost-${BRANCH_SUFFIX}-cluster

      - name: Verificar archivos generados
        shell: bash
        run: |
          ls -lah dist || ls dist

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: bifrost_linux_cluster-${{ steps.clean_branch.outputs.name }}
          path: dist/bifrost-${{ steps.clean_branch.outputs.name }}-cluster

  release:
    needs: [build-cli, build-rocky]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/release'
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Verificar archivos descargados
        run: ls -lah dist

      - name: Mover ejecutables a la raíz de dist
        run: |
          find dist -mindepth 2 -type f -exec mv {} dist/ \;
          ls -lah dist

      - name: Calcular sufijo de rama
        id: clean_branch
        shell: bash
        run: |
          clean_name=$(echo "${{ github.ref_name }}" | sed 's/\//-/g')
          echo "name=$clean_name" >> $GITHUB_OUTPUT

      - name: Eliminar sufijo de rama de los nombres de archivo
        shell: bash
        env:
          BRANCH_SUFFIX: ${{ steps.clean_branch.outputs.name }}
        run: |
          for file in dist/*; do
            [[ -f "$file" ]] || continue
            base=$(basename "$file")
            new_name="${base/-${BRANCH_SUFFIX}/}"
            if [[ "$base" != "$new_name" ]]; then
              mv "$file" "dist/$new_name"
            fi
          done
          ls -lah dist

      - name: Crear GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Release v1.0.${{ github.run_number }}"
          draft: false
          prerelease: false
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}