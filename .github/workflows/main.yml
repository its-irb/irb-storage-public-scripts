name: Build Multiple Executables and Upload to GitHub Releases

on:
  push:
    paths:
      - "src/*.py"
    branches:
      - main
      - release
      - develop
      - feature/*
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ─────────────────────────────────────────────────────────────────
  # macOS → flet build macos → .app
  # Assets (rclone + fuse_t.framework) ya están en el repo en src/assets/
  # ─────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v6.0.2

      - name: Instalar Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      # - name: Instalar Flutter
      #   uses: subosito/flutter-action@v2
      #   with:
      #     flutter-version: "3.27.4"

      - name: Instalar dependencias Python
        run: |
          pip install --upgrade pip
          pip install -r src/pip-requirements.txt

      - name: Limpiar nombre de rama
        id: clean_branch
        run: |
          clean=$(echo "${{ github.ref_name }}" | sed 's/\//-/g')
          echo "name=$clean" >> $GITHUB_OUTPUT

      - name: Escribir versión
        run: echo "__version__ = 'v1.0.${{ github.run_number }}'" > src/version.py

      - name: Build macOS
        run: echo "y" | flet build macos --project src --output dist --no-rich-output

      - name: Renombrar .app
        env:
          BRANCH_SUFFIX: ${{ steps.clean_branch.outputs.name }}
        run: |
          cd dist
          APP=$(find . -maxdepth 1 -name "*.app" | head -1 | sed 's|./||')
          echo "App bundle encontrado: $APP"
          mv "$APP" "bifrost-${BRANCH_SUFFIX}-macos.app"
          ls -lah .

      - name: Subir artefacto
        uses: actions/upload-artifact@v7.0.0
        with:
          name: bifrost-macos-${{ steps.clean_branch.outputs.name }}
          path: dist/*.app

  # ─────────────────────────────────────────────────────────────────
  # Windows → flet build windows → .exe
  # rclone.exe se descarga en CI con windows-assets-downloader.sh
  # ─────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v6.0.2

      - name: Instalar Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      # - name: Instalar Flutter
      #   uses: subosito/flutter-action@v2
      #   with:
      #     flutter-version: "3.27.4"

      - name: Instalar dependencias Python
        run: |
          pip install --upgrade pip
          pip install -r src/pip-requirements.txt

      - name: Descargar rclone para Windows
        shell: bash
        run: cd src && bash windows-assets-downloader.sh

      - name: Limpiar nombre de rama
        id: clean_branch
        shell: bash
        run: |
          clean=$(echo "${{ github.ref_name }}" | sed 's/\//-/g')
          echo "name=$clean" >> $GITHUB_OUTPUT

      - name: Escribir versión
        shell: bash
        run: echo "__version__ = 'v1.0.${{ github.run_number }}'" > src/version.py

      - name: Build Windows
        shell: bash
        env:
          PYTHONUTF8: "1"
        run: echo "y" | flet build windows --project src --output dist --no-rich-output

      - name: Zipear ejecutable Windows
        shell: pwsh
        env:
          BRANCH_SUFFIX: ${{ steps.clean_branch.outputs.name }}
        run: |
          $suffix = $env:BRANCH_SUFFIX
          Compress-Archive -Path dist\* -DestinationPath "bifrost-$suffix-windows.zip"
          Move-Item "bifrost-$suffix-windows.zip" dist\
          Get-ChildItem dist\

      - name: Subir artefacto
        uses: actions/upload-artifact@v7.0.0
        with:
          name: bifrost-windows-${{ steps.clean_branch.outputs.name }}
          path: dist/*.zip

  # ─────────────────────────────────────────────────────────────────
  # Rocky Linux → PyInstaller onefile
  # flet build linux no soporta onefile, necesario para el cluster
  # rclone se descarga en CI con linux-assets-downloader.sh
  # ─────────────────────────────────────────────────────────────────
  build-rocky:
    runs-on: ubuntu-latest
    container:
      image: rockylinux:9
    steps:
      - name: Instalar dependencias sistema
        run: |
          dnf install -y --allowerasing python3.11 python3.11-pip python3.11-devel gcc make \
            glibc-devel unzip zip curl
          python3.11 -m pip install --upgrade pip setuptools wheel

      - name: Checkout código
        uses: actions/checkout@v6.0.2

      - name: Instalar dependencias Python
        run: |
          pip install -r src/pip-requirements.txt
          pip install pyinstaller

      - name: Descargar rclone para Linux
        run: cd src && bash linux-assets-downloader.sh

      - name: Limpiar nombre de rama
        id: clean_branch
        run: |
          clean=$(echo "${{ github.ref_name }}" | sed 's/\//-/g')
          echo "name=$clean" >> $GITHUB_OUTPUT

      - name: Escribir versión
        run: echo "__version__ = 'v1.0.${{ github.run_number }}'" > src/version.py

      - name: Build Rocky Linux (PyInstaller onefile)
        env:
          BRANCH_SUFFIX: ${{ steps.clean_branch.outputs.name }}
        run: |
          mkdir -p dist
          cd src
          pyinstaller --onefile main.py \
            --add-data "assets/bin/rclone:." \
            --collect-all flet \
            --collect-all flet_core \
            --hidden-import flet.fastapi \
            --hidden-import uvicorn \
            --hidden-import uvicorn.lifespan.on \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.protocols.websockets.auto \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.loops.auto \
            --distpath ../dist
          mv ../dist/main "../dist/bifrost-${BRANCH_SUFFIX}-cluster"

      - name: Verificar artefacto generado
        run: ls -lah dist/

      - name: Subir artefacto
        uses: actions/upload-artifact@v7.0.0
        with:
          name: bifrost-cluster-${{ steps.clean_branch.outputs.name }}
          path: dist/bifrost-${{ steps.clean_branch.outputs.name }}-cluster

  # ─────────────────────────────────────────────────────────────────
  # Release → solo en main y release
  # Recoge los artefactos de los tres jobs y crea una GitHub Release
  # ─────────────────────────────────────────────────────────────────
  release:
    needs: [build-macos, build-windows, build-rocky]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/release'
    steps:
      - name: Checkout código
        uses: actions/checkout@v6.0.2

      - name: Descargar todos los artefactos
        uses: actions/download-artifact@v4.3.0
        with:
          path: dist

      - name: Aplanar dist/ (mover archivos a la raíz)
        run: |
          find dist -mindepth 2 -type f -exec mv {} dist/ \;
          ls -lah dist/

      - name: Limpiar nombre de rama
        id: clean_branch
        run: |
          clean=$(echo "${{ github.ref_name }}" | sed 's/\//-/g')
          echo "name=$clean" >> $GITHUB_OUTPUT

      - name: Zipear .app de macOS
        # GitHub Release no soporta subir carpetas directamente
        # Windows (.exe) y Rocky (onefile) no necesitan zip
        env:
          BRANCH_SUFFIX: ${{ steps.clean_branch.outputs.name }}
        run: |
          cd dist
          APP="bifrost-${BRANCH_SUFFIX}-macos.app"
          if [ -d "$APP" ]; then
            zip -r "${APP}.zip" "$APP"
            rm -rf "$APP"
            echo "App zipeado: ${APP}.zip"
          else
            echo "ERROR: no se encontro $APP en dist/"
            ls -lah .
            exit 1
          fi
          ls -lah .

      - name: Quitar sufijo de rama de los nombres de archivo
        env:
          BRANCH_SUFFIX: ${{ steps.clean_branch.outputs.name }}
        run: |
          for f in dist/*; do
            [[ -f "$f" ]] || continue
            base=$(basename "$f")
            new="${base/-${BRANCH_SUFFIX}/}"
            if [[ "$base" != "$new" ]]; then
              mv "$f" "dist/$new"
            fi
          done
          ls -lah dist/

      - name: Crear GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Release v1.0.${{ github.run_number }}"
          draft: false
          prerelease: false
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}