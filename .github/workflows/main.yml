name: Build Multiple Executables and Upload to GitHub Releases

on:
  push:
    paths:
      - "minio/*.py"
    branches:
      - main
      - release
      - develop
      - feature/*
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-cli:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v6.0.2

      - name: Instalar Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r minio/pip-requirements.txt
          pip install pyinstaller

      - name: Descargar rclone para la plataforma actual
        shell: bash
        run: |
          mkdir -p minio/rclone-bin
          RCLONE_VERSION="v1.71.0"
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            curl -L "https://downloads.rclone.org/${RCLONE_VERSION}/rclone-${RCLONE_VERSION}-windows-amd64.zip" -o rclone.zip
            unzip -j rclone.zip "*/rclone.exe" -d minio/rclone-bin/
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            curl -L "https://downloads.rclone.org/${RCLONE_VERSION}/rclone-${RCLONE_VERSION}-osx-amd64.zip" -o rclone.zip
            unzip -j rclone.zip "*/rclone" -d minio/rclone-bin/
            chmod +x minio/rclone-bin/rclone
          elif [[ "$RUNNER_OS" == "Linux" ]]; then
            curl -L "https://downloads.rclone.org/${RCLONE_VERSION}/rclone-${RCLONE_VERSION}-linux-amd64.zip" -o rclone.zip
            unzip -j rclone.zip "*/rclone" -d minio/rclone-bin/
            chmod +x minio/rclone-bin/rclone
          fi
          echo "Rclone downloaded:"
          ls -lah minio/rclone-bin/

      - name: Limpia nombre de rama para artefactos
        id: clean_branch
        shell: bash
        run: |
          clean_name=$(echo "${{ github.ref_name }}" | sed 's/\//-/g')
          echo "name=$clean_name" >> $GITHUB_OUTPUT

      - name: Crear ejecutable bifrost (Windows - onefile)
        if: runner.os == 'Windows'
        shell: bash
        env:
          BRANCH_SUFFIX: ${{ steps.clean_branch.outputs.name }}
        run: |
          mkdir -p dist
          cd minio
          echo "__version__ = 'v1.0.${{ github.run_number }}'" > version.py

          pyinstaller --onefile bifrost.py \
            --add-data "rclone-bin/rclone.exe;." \
            --collect-all flet \
            --collect-all flet_core \
            --hidden-import flet.fastapi \
            --hidden-import uvicorn \
            --hidden-import uvicorn.lifespan.on \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.protocols.websockets.auto \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.loops.auto \
            --distpath ../dist

          mv ../dist/bifrost.exe "../dist/bifrost-${BRANCH_SUFFIX}-windows.exe"
          echo "=== Contenido de dist: ==="
          ls -lah ../dist/

      - name: Crear ejecutable bifrost (macOS - onefile)
        if: runner.os == 'macOS'
        shell: bash
        env:
          BRANCH_SUFFIX: ${{ steps.clean_branch.outputs.name }}
        run: |
          mkdir -p dist
          cd minio
          echo "__version__ = 'v1.0.${{ github.run_number }}'" > version.py

          pyinstaller --onefile bifrost.py \
            --add-data "rclone-bin/rclone:." \
            --collect-all flet \
            --collect-all flet_core \
            --hidden-import flet.fastapi \
            --hidden-import uvicorn \
            --hidden-import uvicorn.lifespan.on \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.protocols.websockets.auto \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.loops.auto \
            --distpath ../dist

          mv ../dist/bifrost "../dist/bifrost-${BRANCH_SUFFIX}-macos"
          echo "=== Contenido de dist: ==="
          ls -lah ../dist/

      - name: Crear ejecutable bifrost (Linux - onefile)
        if: runner.os == 'Linux'
        shell: bash
        env:
          BRANCH_SUFFIX: ${{ steps.clean_branch.outputs.name }}
        run: |
          mkdir -p dist
          cd minio
          echo "__version__ = 'v1.0.${{ github.run_number }}'" > version.py

          pyinstaller --onefile bifrost.py \
            --add-data "rclone-bin/rclone:." \
            --collect-all flet \
            --collect-all flet_core \
            --hidden-import flet.fastapi \
            --hidden-import uvicorn \
            --hidden-import uvicorn.lifespan.on \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.protocols.websockets.auto \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.loops.auto \
            --distpath ../dist

          mv ../dist/bifrost "../dist/bifrost-${BRANCH_SUFFIX}-linux"
          echo "=== Contenido de dist: ==="
          ls -lah ../dist/

      - name: Subir ejecutables CLI como artefactos
        uses: actions/upload-artifact@v7.0.0
        with:
          name: executables-cli-${{ matrix.os }}-${{ steps.clean_branch.outputs.name }}
          path: dist/*

  build-rocky:
    runs-on: ubuntu-latest
    container:
      image: rockylinux:9
    steps:
      - name: Instalar dependencias básicas
        run: |
          dnf install -y python3 python3-pip python3-devel gcc make glibc-devel python3-tkinter unzip zip
          pip3 install --upgrade pip setuptools wheel pyinstaller

      - name: Checkout repo
        uses: actions/checkout@v6.0.2

      - name: Instalar requirements
        run: |
          pip install -r minio/pip-requirements.txt
          pip install pyinstaller

      - name: Descargar rclone para Linux (cluster)
        run: |
          mkdir -p minio/rclone-bin
          curl -L "https://downloads.rclone.org/v1.71.0/rclone-v1.71.0-linux-amd64.zip" -o rclone.zip
          unzip -j rclone.zip "*/rclone" -d minio/rclone-bin/
          chmod +x minio/rclone-bin/rclone
          ls -lah minio/rclone-bin/

      - name: Limpia nombre de rama para artefactos
        id: clean_branch
        run: |
          clean_name=$(echo "${{ github.ref_name }}" | sed 's/\//-/g')
          echo "name=$clean_name" >> $GITHUB_OUTPUT

      - name: Compilar binario Rocky Linux (onefile para cluster)
        env:
          BRANCH_SUFFIX: ${{ steps.clean_branch.outputs.name }}
        run: |
          mkdir -p dist
          cd minio
          echo "__version__ = 'v1.0.${{ github.run_number }}'" > version.py
          pyinstaller --onefile bifrost.py \
            --add-data "rclone-bin/rclone:." \
            --collect-all flet \
            --collect-all flet_core \
            --hidden-import flet.fastapi \
            --hidden-import uvicorn \
            --hidden-import uvicorn.lifespan.on \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.protocols.websockets.auto \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.loops.auto \
            --distpath ../dist
          mv ../dist/bifrost ../dist/bifrost-${BRANCH_SUFFIX}-cluster

      - name: Verificar archivos generados
        run: ls -lah dist/

      - name: Subir artefacto
        uses: actions/upload-artifact@v7.0.0
        with:
          name: bifrost_linux_cluster-${{ steps.clean_branch.outputs.name }}
          path: dist/bifrost-${{ steps.clean_branch.outputs.name }}-cluster

  release:
    needs: [build-cli, build-rocky]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/release'
    steps:
      - name: Checkout código
        uses: actions/checkout@v6.0.2

      - name: Download all artifacts
        uses: actions/download-artifact@v4.3.0
        with:
          path: dist

      - name: Mover ejecutables a la raíz de dist
        run: |
          find dist -mindepth 2 -type f -exec mv {} dist/ \;
          ls -lah dist/

      - name: Calcular sufijo de rama
        id: clean_branch
        shell: bash
        run: |
          clean_name=$(echo "${{ github.ref_name }}" | sed 's/\//-/g')
          echo "name=$clean_name" >> $GITHUB_OUTPUT

      - name: Eliminar sufijo de rama de los nombres de archivo
        shell: bash
        env:
          BRANCH_SUFFIX: ${{ steps.clean_branch.outputs.name }}
        run: |
          for file in dist/*; do
            [[ -f "$file" ]] || continue
            base=$(basename "$file")
            new_name="${base/-${BRANCH_SUFFIX}/}"
            if [[ "$base" != "$new_name" ]]; then
              mv "$file" "dist/$new_name"
            fi
          done
          ls -lah dist/

      - name: Crear GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Release v1.0.${{ github.run_number }}"
          draft: false
          prerelease: false
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}