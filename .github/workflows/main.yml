name: Build & Release — bifrost-transfer + bifrost-mount

on:
  push:
    paths:
      - "bifrost-transfer/src/**"
      - "bifrost-mount/src/**"
      - "shared/**"
      - ".github/workflows/main.yml"
    branches:
      - main
      - release
      - develop
      - feature/**
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ─────────────────────────────────────────────────────────────────────────────
# macOS — flet build macos → .app
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        app: [bifrost-transfer, bifrost-mount]
    steps:
      - name: Checkout código
        uses: actions/checkout@v6.0.2

      - name: Instalar Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Instalar dependencias Python
        run: |
          pip install --upgrade pip
          pip install -r ${{ matrix.app }}/src/pip-requirements.txt

      - name: Copiar shared/backend.py dentro de src/
        run: cp shared/backend.py ${{ matrix.app }}/src/backend.py

      - name: Copiar macos-assets-downloader.sh dentro de src/
        run: |
          if [ "${{ matrix.app }}" = "bifrost-mount" ]; then
            cp shared/macos-assets-downloader.sh ${{ matrix.app }}/src/macos-assets-downloader.sh
          else
            cp shared/macos-rclone-downloader.sh ${{ matrix.app }}/src/macos-rclone-downloader.sh
          fi

      - name: Descargar rclone y fuse-t para macOS
        run: |
          if [ "${{ matrix.app }}" = "bifrost-mount" ]; then
            cd ${{ matrix.app }}/src && bash macos-assets-downloader.sh
          else
            cd ${{ matrix.app }}/src && bash macos-rclone-downloader.sh
          fi

      - name: Limpiar nombre de rama
        id: clean_branch
        run: |
          clean=$(echo "${{ github.ref_name }}" | sed 's/\//-/g')
          echo "name=$clean" >> $GITHUB_OUTPUT

      - name: Escribir versión
        run: echo "__version__ = '1.0.${{ github.run_number }}'" > ${{ matrix.app }}/src/version.py

      - name: Escribir versión en pyproject.toml
        run: |
          sed -i '' 's/^version = .*/version = "1.0.${{ github.run_number }}"/' \
            ${{ matrix.app }}/pyproject.toml

      - name: Build macOS
        run: |
          cd ${{ matrix.app }}
          echo "y" | flet build macos --output dist --no-rich-output

      - name: Añadir fuse_t.framework al bundle
        if: matrix.app == 'bifrost-mount'
        run: |
          APP_BUNDLE=$(find ${{ matrix.app }}/dist -maxdepth 1 -name "*.app" | head -1)
          cp -R ${{ matrix.app }}/src/frameworks/fuse_t.framework \
            "${APP_BUNDLE}/Contents/Frameworks/"

      - name: Renombrar .app
        env:
          BRANCH_SUFFIX: ${{ steps.clean_branch.outputs.name }}
          APP: ${{ matrix.app }}
        run: |
          cd ${APP}/dist
          BUNDLE=$(find . -maxdepth 1 -name "*.app" | head -1 | sed 's|./||')
          echo "App bundle encontrado: $BUNDLE"
          mv "$BUNDLE" "${APP}-${BRANCH_SUFFIX}-macos.app"
          ls -lah .

      - name: Subir artefacto
        uses: actions/upload-artifact@v7.0.0
        with:
          name: ${{ matrix.app }}-macos-${{ steps.clean_branch.outputs.name }}
          path: ${{ matrix.app }}/dist/*.app

  # ─────────────────────────────────────────────────────────────────────────────
  # Windows — flet build windows + Inno Setup
  # ─────────────────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        app: [bifrost-transfer, bifrost-mount]
    steps:
      - name: Checkout código
        uses: actions/checkout@v6.0.2

      - name: Instalar Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Instalar dependencias Python
        run: pip install -r ${{ matrix.app }}/src/pip-requirements.txt

      - name: Copiar shared/backend.py dentro de src/
        shell: pwsh
        run: Copy-Item shared/backend.py ${{ matrix.app }}/src/backend.py

      - name: Copiar windows-assets-downloader.sh dentro de src/
        shell: bash
        run: cp shared/windows-assets-downloader.sh ${{ matrix.app }}/src/windows-assets-downloader.sh

      - name: Descargar rclone para Windows
        shell: bash
        run: cd ${{ matrix.app }}/src && bash windows-assets-downloader.sh

      - name: Limpiar nombre de rama
        id: clean_branch
        shell: bash
        run: |
          clean=$(echo "${{ github.ref_name }}" | sed 's/\//-/g')
          echo "name=$clean" >> $GITHUB_OUTPUT

      - name: Escribir versión
        shell: bash
        run: echo "__version__ = '1.0.${{ github.run_number }}'" > ${{ matrix.app }}/src/version.py

      - name: Escribir versión en pyproject.toml
        shell: bash
        run: |
          sed -i 's/^version = .*/version = "1.0.${{ github.run_number }}"/' \
            ${{ matrix.app }}/pyproject.toml

      - name: Build Windows
        shell: bash
        env:
          PYTHONUTF8: "1"
        run: |
          cd ${{ matrix.app }}
          echo "y" | flet build windows --output dist --no-rich-output

      - name: Crear directorio installer
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path ${{ matrix.app }}/installer

      - name: Package Windows installer (Inno Setup)
        shell: pwsh
        env:
          BRANCH_SUFFIX: ${{ steps.clean_branch.outputs.name }}
          APP_VERSION: "1.0.${{ github.run_number }}"
          APP: ${{ matrix.app }}
        run: |
          Write-Host "=== dist/ structure ==="
          Get-ChildItem -Recurse $env:APP/dist | Select-Object FullName
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DBranchSuffix="$env:BRANCH_SUFFIX" `
            /DAppVersion="$env:APP_VERSION" `
            /DAppName="$env:APP" `
            "$env:APP\installer.iss"

      - name: Subir artefacto
        uses: actions/upload-artifact@v7.0.0
        with:
          name: ${{ matrix.app }}-windows-${{ steps.clean_branch.outputs.name }}
          path: ${{ matrix.app }}/installer/*.exe

  # ─────────────────────────────────────────────────────────────────────────────
  # Rocky Linux — PyInstaller onefile para las dos apps
  # flet build linux no soporta onefile
  # ─────────────────────────────────────────────────────────────────────────────
  build-rocky:
    runs-on: ubuntu-latest
    container:
      image: rockylinux:9
    strategy:
      matrix:
        app: [bifrost-transfer, bifrost-mount]
    steps:
      - name: Instalar dependencias sistema
        run: |
          dnf install -y --allowerasing python3.11 python3.11-pip python3.11-devel gcc make \
            glibc-devel unzip zip curl
          python3.11 -m pip install --upgrade pip setuptools wheel

      - name: Checkout código
        uses: actions/checkout@v6.0.2

      - name: Instalar dependencias Python
        run: |
          python3.11 -m pip install -r ${{ matrix.app }}/src/pip-requirements.txt
          python3.11 -m pip install pyinstaller

      - name: Copiar shared/backend.py dentro de src/
        run: cp shared/backend.py ${{ matrix.app }}/src/backend.py

      - name: Copiar linux-assets-downloader.sh dentro de src/
        run: cp shared/linux-assets-downloader.sh ${{ matrix.app }}/src/linux-assets-downloader.sh

      - name: Descargar rclone para Linux
        run: cd ${{ matrix.app }}/src && bash linux-assets-downloader.sh

      - name: Limpiar nombre de rama
        id: clean_branch
        run: |
          clean=$(echo "${{ github.ref_name }}" | sed 's/\//-/g')
          echo "name=$clean" >> $GITHUB_OUTPUT

      - name: Escribir versión
        run: echo "__version__ = '1.0.${{ github.run_number }}'" > ${{ matrix.app }}/src/version.py

      - name: Build Rocky Linux (PyInstaller onefile)
        env:
          BRANCH_SUFFIX: ${{ steps.clean_branch.outputs.name }}
          APP: ${{ matrix.app }}
        run: |
          mkdir -p dist
          cd ${APP}/src
          python3.11 -m PyInstaller --onefile main.py \
            --add-data "assets/bin/rclone:." \
            --collect-all flet \
            --collect-all flet_core \
            --hidden-import flet.fastapi \
            --hidden-import uvicorn \
            --hidden-import uvicorn.lifespan.on \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.protocols.websockets.auto \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.loops.auto \
            --distpath ../../dist
          mv ../../dist/main "../../dist/${APP}-${BRANCH_SUFFIX}-linux"

      - name: Verificar artefacto generado
        run: ls -lah dist/

      - name: Subir artefacto
        uses: actions/upload-artifact@v7.0.0
        with:
          name: ${{ matrix.app }}-linux-${{ steps.clean_branch.outputs.name }}
          path: dist/${{ matrix.app }}-${{ steps.clean_branch.outputs.name }}-linux

  # ─────────────────────────────────────────────────────────────────────────────
  # Release — solo en main y release
  # Recoge los artefactos de los tres jobs y crea una GitHub Release
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    needs: [build-macos, build-windows, build-rocky]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/release'
    steps:
      - name: Checkout código
        uses: actions/checkout@v6.0.2

      - name: Descargar todos los artefactos
        uses: actions/download-artifact@v4.3.0
        with:
          path: dist
          merge-multiple: true

      - name: Verificar dist
        run: ls -lah dist/

      - name: Limpiar nombre de rama
        id: clean_branch
        run: |
          clean=$(echo "${{ github.ref_name }}" | sed 's/\//-/g')
          echo "name=$clean" >> $GITHUB_OUTPUT

      #- name: Zipear .app bundles de macOS
      #  env:
      #    BRANCH_SUFFIX: ${{ steps.clean_branch.outputs.name }}
      #  run: |
      #    cd dist
      #    for APP in bifrost-transfer bifrost-mount; do
      #      BUNDLE="${APP}-${BRANCH_SUFFIX}-macos.app"
      #      if [ -d "$BUNDLE" ]; then
      #        zip -r "${BUNDLE}.zip" "$BUNDLE"
      #        rm -rf "$BUNDLE"
      #        echo "Zipeado: ${BUNDLE}.zip"
      #      fi
      #    done
       #   ls -lah .

      - name: Verificar artefactos macOS
        env:
          BRANCH_SUFFIX: ${{ steps.clean_branch.outputs.name }}
        run: |
          ls -lah dist/
          for APP in bifrost-transfer bifrost-mount; do
            test -f "dist/${APP}-${BRANCH_SUFFIX}-macos.app.zip" \
              && echo "OK: ${APP}" \
              || echo "WARNING: ${APP} no encontrado"
          done

      - name: Crear GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Release v1.0.${{ github.run_number }}"
          draft: false
          prerelease: false
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}